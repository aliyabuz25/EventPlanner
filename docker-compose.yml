services:
  fastlane:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: 'production'
      HOST: '0.0.0.0'
      PORT: '3000'
      CONTENT_DATA_DIR: '/app/data'
      UPLOADS_DIR: '/app/uploads'
      PUBLIC_BASE_URL: 'https://fastlane.octotech.az'
      OLLAMA_GENERATE_URL: 'https://qwen.octotech.az/api/generate'
      OLLAMA_MODEL: 'qwen2:0.5b'
      OLLAMA_TIMEOUT_MS: '90000'
      OLLAMA_NUM_PREDICT: '160'
    ports:
      - '3000:3000'
    volumes:
      - /datastore/fastlane/data:/app/data
      - /datastore/fastlane/uploads:/app/uploads
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - edge
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=edge'
      - 'traefik.http.routers.fastlane.rule=Host(`fastlane.octotech.az`)'
      - 'traefik.http.routers.fastlane.entrypoints=web,websecure'
      - 'traefik.http.routers.fastlane.tls=true'
      - 'traefik.http.services.fastlane.loadbalancer.server.port=3000'
      - 'traefik.http.routers.fastlane-api.rule=(Host(`fastlane.octotech.az`)) && (PathPrefix(`/api`) || PathPrefix(`/uploads`))'
      - 'traefik.http.routers.fastlane-api.entrypoints=web,websecure'
      - 'traefik.http.routers.fastlane-api.tls=true'
      - 'traefik.http.routers.fastlane-api.priority=100'
      - 'traefik.http.services.fastlane-api.loadbalancer.server.port=3000'

networks:
  edge:
    external: true
